services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: {{container_name}}
    restart: unless-stopped
    environment:
      - TZ={{timezone}}
      - PUID={{puid}}
      - PGID={{pgid}}
    ports:
      - "{{http_port}}:8096"
    volumes:
      - {{config_dir}}:/config
      - {{cache_dir}}:/cache
      - {{media_dir}}:/media
