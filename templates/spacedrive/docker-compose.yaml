services:
  spacedrive:
    image: ghcr.io/spacedriveapp/spacedrive:latest
    container_name: {{container_name}}
    restart: unless-stopped
    ports:
{{#ports}}
      - "{{host}}:{{container}}/{{protocol}}"
{{/ports}}
    volumes:
{{#volumes}}
      - {{source}}:{{target}}:{{mode}}
{{/volumes}}
    environment:
      - TZ=Asia/Shanghai