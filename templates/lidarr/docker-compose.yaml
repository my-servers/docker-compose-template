services:
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: {{container_name}}
    restart: unless-stopped
    environment:
      - PUID={{puid}}
      - PGID={{pgid}}
      - TZ=Asia/Shanghai
    ports:
      - "{{http_port}}:8686"
    volumes:
      - {{config_dir}}:/config
      - {{music_dir}}:/music