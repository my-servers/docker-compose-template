services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: {{container_name}}
    restart: unless-stopped
    user: "{{puid}}:{{pgid}}"
    ports:
{{#ports}}
      - "{{host}}:{{container}}/{{protocol}}"
{{/ports}}
    volumes:
{{#volumes}}
      - {{source}}:{{target}}:{{mode}}
{{/volumes}}
    environment:
      - TZ=Asia/Shanghai