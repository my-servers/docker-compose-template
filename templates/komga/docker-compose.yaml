services:
  komga:
    image: gotson/komga:latest
    container_name: {{container_name}}
    restart: unless-stopped
    ports:
{{#ports}}
      - "{{host}}:{{container}}/{{protocol}}"
{{/ports}}
    volumes:
{{#volumes}}
      - {{source}}:{{target}}:{{mode}}
{{/volumes}}
    environment:
      - PUID={{puid}}
      - PGID={{pgid}}