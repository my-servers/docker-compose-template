services:
  wikijs:
    image: requarks/wiki:2
    container_name: {{container_name}}
    restart: unless-stopped
    ports:
{{#ports}}
      - "{{host}}:{{container}}/{{protocol}}"
{{/ports}}
    volumes:
{{#volumes}}
      - {{source}}:{{target}}:{{mode}}
{{/volumes}}
    environment:
      - TZ=Asia/Shanghai
      - DB_TYPE=sqlite
      - DB_FILEPATH=/wiki/data/db.sqlite
