services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: {{container_name}}
    restart: unless-stopped
    environment:
      - TZ={{timezone}}
      - PUID={{puid}}
      - PGID={{pgid}}
    ports:
      - "{{http_port}}:8989"
    volumes:
      - {{config_dir}}:/config
      - {{tv_dir}}:/tv
      - {{downloads_dir}}:/downloads
