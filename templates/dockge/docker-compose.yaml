services:
  dockge:
    image: louislam/dockge:1
    container_name: {{container_name}}
    restart: unless-stopped
    ports:
      - "{{http_port}}:5001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - {{data_dir}}:/app/data
      - {{stacks_dir}}:/stacks
    environment:
      - DOCKGE_STACKS_DIR=/stacks