services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: {{container_name}}
    restart: unless-stopped
    ports:
{{#ports}}
      - "{{host}}:{{container}}/{{protocol}}"
{{/ports}}
    volumes:
{{#volumes}}
      - {{source}}:{{target}}:{{mode}}
{{/volumes}}
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - PUID={{puid}}
      - PGID={{pgid}}