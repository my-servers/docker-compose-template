services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: {{container_name}}
    restart: unless-stopped
    ports:
      - "{{http_port}}:3000"
    volumes:
      - {{config_dir}}:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - PUID={{puid}}
      - PGID={{pgid}}