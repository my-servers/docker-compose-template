services:
  emby:
    image: lscr.io/linuxserver/emby:latest
    container_name: {{container_name}}
    restart: unless-stopped
    environment:
      - TZ={{timezone}}
      - PUID={{puid}}
      - PGID={{pgid}}
    ports:
      - "{{http_port}}:8096"
    volumes:
      - {{config_dir}}:/config
      - {{transcode_dir}}:/transcode
      - {{media_dir}}:/media
