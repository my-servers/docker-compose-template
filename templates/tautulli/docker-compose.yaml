services:
  tautulli:
    image: lscr.io/linuxserver/tautulli:latest
    container_name: {{container_name}}
    restart: unless-stopped
    environment:
      - PUID={{puid}}
      - PGID={{pgid}}
      - TZ=Asia/Shanghai
    ports:
{{#ports}}
      - "{{host}}:{{container}}/{{protocol}}"
{{/ports}}    volumes:
{{#volumes}}
      - {{source}}:{{target}}:{{mode}}
{{/volumes}}